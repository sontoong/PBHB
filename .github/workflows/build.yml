name: Build & Upload

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: write

jobs:
  build-app:
    name: Build PBHB.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync
          uv pip install pyinstaller

      - name: Build PBHB.exe
        run: uv run pyinstaller app.spec

      - uses: actions/cache/save@v5
        with:
          path: dist/PBHB.exe
          key: pbhb-${{ github.run_id }}

  build-updater:
    name: Build updater.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install updater dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller packaging httpx

      - name: Build updater.exe
        run: |
          cd tools
          pyinstaller updater.spec

      - uses: actions/cache/save@v5
        with:
          path: tools/dist/updater.exe
          key: updater-${{ github.run_id }}

  upload:
    name: Upload release assets
    runs-on: windows-latest
    needs: [build-app, build-updater]
    steps:
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: actions/cache/restore@v5
        with:
          path: dist/PBHB.exe
          key: pbhb-${{ github.run_id }}
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: tools/dist/updater.exe
          key: updater-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Write version file
        shell: bash
        run: |
          mkdir -p dist
          echo "${{ steps.version.outputs.VERSION }}" > dist/version

      - name: Create release zip
        shell: bash
        run: |
          FOLDER="PBHB"
          mkdir -p "release/$FOLDER/_internal/tools"
          cp dist/PBHB.exe "release/$FOLDER/PBHB.exe"
          cp dist/version "release/$FOLDER/_internal/version"
          cp tools/dist/updater.exe "release/$FOLDER/_internal/tools/updater.exe"
          cd release
          zip -r "../dist/download.zip" "$FOLDER/"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/PBHB.exe
            dist/download.zip

  cleanup:
    name: Delete cache
    runs-on: ubuntu-latest
    needs: [upload]
    if: always()
    steps:
      - run: gh cache delete pbhb-${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: gh cache delete updater-${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

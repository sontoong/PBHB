name: Build & Upload

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-app:
    name: Build PBHB.exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync
          uv pip install pyinstaller

      - name: Build PBHB.exe
        run: uv run pyinstaller app.spec

      - name: Upload PBHB.exe artifact
        uses: actions/upload-artifact@v6
        with:
          name: artifact-pbhb-exe
          path: dist/PBHB.exe
          if-no-files-found: error

  build-updater:
    name: Build updater.exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install updater dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller packaging httpx

      - name: Build updater.exe
        run: |
          cd tools
          pyinstaller updater.spec

      - name: Upload updater artifact
        uses: actions/upload-artifact@v6
        with:
          name: artifact-updater-exe
          path: tools/dist/updater.exe
          if-no-files-found: error

  upload:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [build-app, build-updater]

    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*-exe"
          merge-multiple: true
          path: dist/

      - name: Write version file
        run: echo "${{ steps.version.outputs.VERSION }}" > dist/version

      - name: Create release zip
        run: |
          FOLDER="PBHB"
          mkdir -p "release/$FOLDER/_internal/tools"
          cp dist/PBHB.exe "release/$FOLDER/PBHB.exe"
          cp dist/version "release/$FOLDER/_internal/version"
          cp dist/updater.exe "release/$FOLDER/_internal/tools/updater.exe"
          cd release
          zip -r "../dist/download.zip" "$FOLDER/"

      - name: Upload to existing release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/PBHB.exe
            dist/download.zip

  cleanup:
    name: Delete artifacts
    runs-on: ubuntu-latest
    needs: [upload]
    if: always()

    steps:
      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: artifact-*
          failOnError: false
